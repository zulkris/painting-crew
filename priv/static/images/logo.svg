<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-hidden="true">
  <!-- Three diagonal stripes from upper-left to lower-right -->
  <!-- Stripe 1: upper-left triangle -->
  <polygon points="0,0 44,0 0,44" fill="#184675"/>
  <!-- Stripe 2: middle diagonal band -->
  <polygon points="56,0 100,0 100,16 16,100 0,100 0,56" fill="#184675"/>
  <!-- Stripe 3: lower-right triangle (accent) -->
  <polygon points="100,28 100,100 28,100" fill="#cc0101"/>
</svg>
