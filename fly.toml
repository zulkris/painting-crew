app = "painting-crew"
primary_region = "ams"
kill_signal = "SIGTERM"
kill_timeout = 5

[build]
  build-target = "runner"

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "painting-crew.fly.dev"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
